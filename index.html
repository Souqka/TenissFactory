<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Управление производством</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏭</text></svg>">
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f8faf8;
            --text-primary: #2d3436; --text-secondary: #636e72;
            --border-color: #a8e6cf; --border-light: #dcedc1;
            --accent-green: #4caf50; --danger-red: #ff6b6b;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --card-bg: #ffffff; --hover-bg: #f0f7f0;
            --chart-grid: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a2e; --bg-secondary: #16213e;
            --text-primary: #e0e0e0; --text-secondary: #a0a0a0;
            --border-color: #2d5a3d; --border-light: #1e3a2f;
            --accent-green: #66bb6a; --danger-red: #ef5350;
            --shadow: 0 2px 8px rgba(0,0,0,0.4);
            --card-bg: #222831; --hover-bg: #2d3a2d;
            --chart-grid: #3a3a4a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary); color: var(--text-primary);
            transition: all 0.3s ease;
            touch-action: manipulation; -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-primary); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .auth-overlay.hidden { display: none; }

        .auth-card {
            background: var(--card-bg); border-radius: 20px; padding: 40px;
            border: 2px solid var(--border-color); box-shadow: var(--shadow);
            text-align: center; max-width: 400px; width: 90%;
        }
        .auth-card h2 { color: var(--accent-green); margin-bottom: 20px; }
        .auth-input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid var(--border-color); border-radius: 10px;
            font-size: 24px; text-align: center; letter-spacing: 10px;
            background: var(--bg-primary); color: var(--text-primary);
        }
        .auth-input:focus { outline: none; border-color: var(--accent-green); }
        .user-list { display: flex; flex-direction: column; gap: 8px; margin: 15px 0; }
        .user-btn {
            padding: 12px; border: 2px solid var(--border-color);
            border-radius: 10px; background: var(--card-bg);
            color: var(--text-primary); cursor: pointer; font-size: 16px;
            transition: all 0.3s ease; text-align: left;
        }
        .user-btn:hover { background: var(--accent-green); color: white; border-color: var(--accent-green); }
        .custom-user-btn { font-style: italic; }

        .app-container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 15px;
            background: var(--card-bg); border-radius: 15px;
            border: 2px solid var(--border-color); box-shadow: var(--shadow);
            flex-wrap: wrap; gap: 10px;
        }
        .header h1 { color: var(--accent-green); font-size: clamp(18px, 4vw, 24px); }
        .header-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

        .user-badge {
            padding: 6px 12px; border-radius: 20px; font-size: 13px;
            font-weight: 600; white-space: nowrap;
            background: var(--hover-bg); color: var(--text-primary);
            cursor: pointer; border: 2px solid var(--border-color);
        }
        .user-badge:hover { background: var(--accent-green); color: white; }

        .sync-status {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 20px;
            font-size: 13px; font-weight: 600; white-space: nowrap;
        }
        .sync-online { background: #d4edda; color: #155724; }
        .sync-offline { background: #fff3cd; color: #856404; }
        .sync-error { background: #f8d7da; color: #721c24; }
        .sync-loading { background: #cce5ff; color: #004085; }
        [data-theme="dark"] .sync-online { background: #1e3a2f; color: #66bb6a; }
        [data-theme="dark"] .sync-offline { background: #3d3520; color: #ffd54f; }
        [data-theme="dark"] .sync-error { background: #3d2020; color: #ef5350; }
        [data-theme="dark"] .sync-loading { background: #1a2a3d; color: #66b0ff; }

        .btn-sm {
            padding: 8px 14px; border: 2px solid var(--border-color);
            border-radius: 8px; background: var(--card-bg);
            color: var(--text-primary); cursor: pointer;
            transition: all 0.3s ease; font-size: 13px; white-space: nowrap;
        }
        .btn-sm:hover { background: var(--hover-bg); }
        .btn-sm.active { background: var(--accent-green); color: white; border-color: var(--accent-green); }

        .sections-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 350px), 1fr));
            gap: 20px; margin-bottom: 25px;
        }

        .section {
            background: var(--card-bg); border-radius: 15px; padding: 20px;
            border: 2px solid var(--border-color); box-shadow: var(--shadow);
        }
        .section-title {
            color: var(--accent-green); font-size: clamp(16px, 3vw, 20px);
            margin-bottom: 15px; padding-bottom: 10px;
            border-bottom: 2px solid var(--border-light);
        }
        .subsection-title {
            color: var(--text-primary); font-size: 14px;
            margin: 12px 0 8px 0; font-weight: 600;
        }

        .item {
            margin-bottom: 12px; padding: 12px;
            background: var(--bg-secondary); border-radius: 10px;
            border: 1px solid var(--border-light);
        }
        .sub-item {
            margin-left: 15px; padding: 8px;
            background: var(--bg-primary); border-radius: 8px;
            border: 1px solid var(--border-light);
        }
        .item-name {
            font-weight: 600; margin-bottom: 8px;
            display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 8px;
            font-size: clamp(12px, 2.5vw, 14px);
        }
        .item-value { font-size: clamp(14px, 3vw, 18px); font-weight: bold; }
        .critical-low { color: var(--danger-red); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .min-badge {
            font-size: 11px; padding: 2px 6px; border-radius: 10px;
            background: var(--border-light); color: var(--text-secondary);
            cursor: pointer;
        }
        .min-badge:hover { background: var(--accent-green); color: white; }
        .item-controls { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .qty-input {
            width: 60px; padding: 6px; border: 2px solid var(--border-color);
            border-radius: 6px; text-align: center; font-size: 14px;
            background: var(--bg-primary); color: var(--text-primary);
        }
        .qty-input:focus { outline: none; border-color: var(--accent-green); }

        .btn {
            padding: 6px 10px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 12px; font-weight: bold;
            transition: all 0.3s ease; color: white; min-width: 35px;
        }
        .btn-m10 { background: #e74c3c; } .btn-m1 { background: #ff7675; }
        .btn-p1 { background: #55efc4; color: #2d3436; } .btn-p10 { background: #00b894; }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }
        .btn:active { transform: scale(0.95); }

        .panel {
            background: var(--card-bg); border-radius: 15px; padding: 20px;
            border: 2px solid var(--border-color); box-shadow: var(--shadow);
            margin-bottom: 25px;
        }

        .history-list { max-height: 350px; overflow-y: auto; }
        .history-item {
            padding: 10px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; color: var(--text-secondary);
        }
        .history-item:last-child { border-bottom: none; }
        .history-summary {
            padding: 10px; border-radius: 8px; margin: 5px 0;
            font-weight: bold; font-size: 14px;
        }
        .history-summary.added { background: #d4edda; color: #155724; }
        .history-summary.removed { background: #f8d7da; color: #721c24; }
        [data-theme="dark"] .history-summary.added { background: #1e3a2f; color: #66bb6a; }
        [data-theme="dark"] .history-summary.removed { background: #3d2020; color: #ef5350; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px; margin-top: 15px;
        }
        .stat-card {
            background: var(--bg-secondary); padding: 15px;
            border-radius: 10px; border: 1px solid var(--border-light);
            text-align: center;
        }
        .stat-card h4 { color: var(--text-secondary); margin-bottom: 8px; font-size: 13px; }
        .stat-value { font-size: clamp(24px, 5vw, 32px); font-weight: bold; color: var(--accent-green); }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab {
            padding: 8px 16px; border: 2px solid var(--border-color);
            border-radius: 8px; background: var(--card-bg);
            color: var(--text-primary); cursor: pointer; font-size: 14px;
            transition: all 0.3s ease; white-space: nowrap;
        }
        .tab.active { background: var(--accent-green); color: white; border-color: var(--accent-green); }
        .tab:hover { background: var(--hover-bg); }
        .tab.active:hover { background: var(--accent-green); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .alert-box {
            background: #fff3f3; border: 2px solid var(--danger-red);
            border-radius: 10px; padding: 12px; margin-bottom: 15px;
        }
        .alert-header {
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; user-select: none;
        }
        .alert-header h3 { color: var(--danger-red); margin: 0; font-size: 16px; }
        .alert-body { margin-top: 10px; }
        .alert-body.hidden { display: none; }
        [data-theme="dark"] .alert-box { background: #3d2020; }
        .alert-item { color: var(--danger-red); padding: 4px 0; font-size: 13px; }
        .alert-section-title { color: var(--danger-red); font-weight: 600; margin: 8px 0 4px 0; font-size: 14px; }

        .limits-panel {
            background: var(--card-bg); border-radius: 15px; padding: 20px;
            border: 2px solid #ffd93d; box-shadow: var(--shadow);
            margin-bottom: 25px; display: none;
        }
        .limits-panel.show { display: block; }
        .limits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px; margin-top: 15px;
        }
        .limit-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; background: var(--bg-secondary);
            border-radius: 8px; border: 1px solid var(--border-light);
            font-size: 13px;
        }
        .limit-name { font-weight: 600; flex: 1; }
        .limit-controls { display: flex; align-items: center; gap: 6px; }
        .limit-input {
            width: 60px; padding: 5px; border: 2px solid var(--border-color);
            border-radius: 6px; text-align: center; font-size: 13px;
            background: var(--bg-primary); color: var(--text-primary);
        }

        .pinboard {
            background: var(--card-bg); border-radius: 15px; padding: 15px;
            border: 2px solid #74b9ff; box-shadow: var(--shadow);
            margin-bottom: 15px;
        }
        .pinboard-header {
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; user-select: none;
        }
        .pinboard-header h2 { color: #74b9ff; font-size: 18px; margin: 0; }
        .pinboard-body { margin-top: 12px; }
        .pinboard-body.hidden { display: none; }

        .note-card {
            background: var(--bg-secondary); border-radius: 10px;
            padding: 12px; margin-bottom: 8px;
            border: 1px solid var(--border-light); font-size: 13px;
        }
        .note-card.done { opacity: 0.6; border-left: 4px solid var(--accent-green); }
        .note-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 6px; flex-wrap: wrap; gap: 5px;
        }
        .note-text { font-size: 14px; margin-bottom: 6px; word-break: break-word; }
        .note-meta { display: flex; gap: 10px; font-size: 11px; color: var(--text-secondary); flex-wrap: wrap; }
        .note-actions { display: flex; gap: 4px; margin-top: 6px; }
        .note-btn {
            padding: 3px 8px; border: 1px solid var(--border-color);
            border-radius: 4px; background: var(--card-bg);
            color: var(--text-primary); cursor: pointer; font-size: 11px;
        }
        .note-btn.done-btn { color: var(--accent-green); border-color: var(--accent-green); }
        .note-btn.delete-btn { color: var(--danger-red); border-color: var(--danger-red); }
        .note-btn.edit-btn { color: #74b9ff; border-color: #74b9ff; }

        .add-note-form {
            display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
            padding: 12px; background: var(--bg-secondary);
            border-radius: 10px; border: 1px dashed var(--border-color);
        }
        .add-note-form input, .add-note-form select {
            padding: 8px; border: 2px solid var(--border-color);
            border-radius: 8px; font-size: 13px;
            background: var(--bg-primary); color: var(--text-primary);
            flex: 1; min-width: 120px;
        }

        .goal-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px; background: var(--bg-secondary);
            border-radius: 8px; margin-bottom: 8px; flex-wrap: wrap;
        }
        .goal-label { font-weight: 600; min-width: 80px; font-size: 14px; }
        .goal-input {
            width: 70px; padding: 6px; border: 2px solid var(--border-color);
            border-radius: 6px; text-align: center; font-size: 14px;
            background: var(--bg-primary); color: var(--text-primary);
        }
        .goal-progress {
            font-size: 14px; font-weight: bold;
            padding: 4px 10px; border-radius: 10px;
        }
        .goal-done { background: #d4edda; color: #155724; }
        .goal-pending { background: #fff3cd; color: #856404; }

        /* CHART */
        .chart-container {
            position: relative; width: 100%; max-width: 800px;
            margin: 20px auto; background: var(--bg-secondary);
            border-radius: 15px; padding: 20px;
        }
        canvas { display: block; width: 100%; cursor: crosshair; }
        .chart-controls {
            display: flex; gap: 8px; justify-content: center;
            margin-bottom: 15px; flex-wrap: wrap;
        }
        .chart-tooltip {
            position: absolute; background: var(--card-bg); color: var(--text-primary);
            padding: 6px 10px; border-radius: 6px; font-size: 12px;
            pointer-events: none; display: none; z-index: 10;
            border: 1px solid var(--border-color); box-shadow: var(--shadow);
        }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--accent-green); color: white;
            padding: 10px 20px; border-radius: 20px;
            box-shadow: var(--shadow); display: none; z-index: 999;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

        @media (max-width: 768px) {
            .app-container { padding: 10px; }
            .sections-container { grid-template-columns: 1fr; gap: 15px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .header { padding: 12px; gap: 8px; }
            .header h1 { font-size: 18px; }
            .btn-sm { padding: 6px 10px; font-size: 11px; }
            .tabs { gap: 5px; }
            .tab { padding: 6px 10px; font-size: 12px; }
            .limits-grid { grid-template-columns: 1fr; }
            .add-note-form { flex-direction: column; }
            .section { padding: 15px; }
            .item { padding: 10px; }
            .btn { padding: 5px 8px; font-size: 11px; min-width: 30px; }
            .qty-input { width: 50px; padding: 5px; font-size: 12px; }
            .chart-container { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card" id="authCard"></div>
    </div>

    <div class="app-container" id="appContainer" style="display:none">
        <header class="header">
            <h1>🏭 Производство</h1>
            <div class="header-controls">
                <span class="user-badge" onclick="switchUser()" id="userBadge">👤</span>
                <span class="sync-status sync-loading" id="syncStatus">🔄</span>
                <button class="btn-sm" onclick="syncNow()">🔄</button>
                <button class="btn-sm" onclick="dailySummary()">📅 Итог дня</button>
                <button class="btn-sm" onclick="toggleLimits()" id="limitsBtn">⚙️</button>
                <button class="btn-sm" onclick="toggleTheme()">🌙</button>
            </div>
        </header>

        <div class="limits-panel" id="limitsPanel">
            <h2 class="section-title">⚙️ Минимальные запасы</h2>
            <div class="limits-grid" id="limitsGrid"></div>
            <div style="margin-top:15px;text-align:right">
                <button class="btn btn-p10" onclick="saveLimits()">💾 Сохранить</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('inventory')">📦 Производство</button>
            <button class="tab" onclick="switchTab('history')">📋 История</button>
            <button class="tab" onclick="switchTab('stats')">📊 Статистика</button>
            <button class="tab" onclick="switchTab('chart')">📈 График</button>
            <button class="tab" onclick="switchTab('goals')">🎯 Цели</button>
        </div>

        <div id="tab-inventory" class="tab-content active">
            <div id="alerts"></div>
            
            <div class="pinboard" id="pinboard">
                <div class="pinboard-header" onclick="togglePinboard()">
                    <h2>📌 Записки <span id="noteCount">[0]</span></h2>
                    <span id="pinboardArrow">▼</span>
                </div>
                <div class="pinboard-body" id="pinboardBody">
                    <div id="notesList"></div>
                    <div class="add-note-form">
                        <input type="text" id="newNoteText" placeholder="Текст записки..." maxlength="200">
                        <select id="newNoteAssignee"><option value="">Исполнитель...</option></select>
                        <button class="btn btn-p10" onclick="addNote()">+</button>
                    </div>
                </div>
            </div>

            <div class="sections-container">
                <div class="section"><h2 class="section-title">📦 Отдел 1: Запасы</h2><div id="supplies"></div></div>
                <div class="section"><h2 class="section-title">⚙️ Отдел 2: Производство</h2><div id="production"></div></div>
                <div class="section"><h2 class="section-title">🔧 Отдел 3: Сборка</h2><div id="assembly"></div></div>
            </div>
        </div>

        <div id="tab-history" class="tab-content">
            <div class="panel">
                <h2 class="section-title">📋 История изменений</h2>
                <div style="margin-bottom:15px;display:flex;gap:10px">
                    <button class="btn btn-m10" onclick="clearHistory()">🗑️ Очистить</button>
                    <button class="btn btn-p10" onclick="dailySummary()">📅 Итог дня</button>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>

        <div id="tab-stats" class="tab-content">
            <div class="panel"><h2 class="section-title">📊 Статистика</h2><div class="stats-grid" id="statsGrid"></div></div>
            <div class="panel" style="margin-top:15px"><h2 class="section-title" style="color:#74b9ff">✅ Выполненные записки</h2><div id="doneNotesList"></div></div>
        </div>

        <div id="tab-chart" class="tab-content">
            <div class="panel">
                <h2 class="section-title">📈 График отданных рамок</h2>
                <div class="chart-controls">
                    <button class="btn-sm period-btn active" onclick="changePeriod(7, this)">7 дней</button>
                    <button class="btn-sm period-btn" onclick="changePeriod(30, this)">30 дней</button>
                    <button class="btn-sm period-btn" onclick="changePeriod(0, this)">Всё время</button>
                </div>
                <div class="chart-container" id="chartContainer">
                    <canvas id="chartCanvas"></canvas>
                    <div class="chart-tooltip" id="chartTooltip"></div>
                </div>
            </div>
        </div>

        <div id="tab-goals" class="tab-content">
            <div class="panel"><h2 class="section-title">🎯 Цели на день</h2><div id="goalsContent"></div></div>
        </div>
    </div>

    <div class="toast" id="toast">✓ Сохранено</div>

    <script>
        // ============ КОНФИГУРАЦИЯ ============
        const SYNC_URL = 'https://script.google.com/macros/s/AKfycbzTeiQslDVeA9Zcyr9HodMjda76w5RA6LM0h8_NV2Y7T-0hyHAU1KZVH545ZsuD7CV1iw/exec';
        const SYNC_INTERVAL = 15000;
        const PASS = '0000';
        const USERS = ['Илья', 'Глеб', 'Артур', 'Наём. Раб.'];
        const USER_COLORS = {
            'Илья': '#3498db', 'Глеб': '#e67e22',
            'Артур': '#9b59b6', 'Наём. Раб.': '#95a5a6'
        };

        // ============ ДАННЫЕ ============
        const defaultData = {
            supplies: {
                'Скотч желтый':1,'Скотч прозрачный':1,'Стрэйтч':1,
                'Крючки черные':1,'Крючки белые':1,'Пластик белый':1,
                'Коробки':1,'Грунт':1,'Пупырка':1,
                'Рамки черные':1,'Рамки белые':1,'Оргстекло':1,'Доски':1
            },
            production: {
                'Пластик нарезанный':1,'Сушка грунта':1,'Сушка полей':1,
                'Готовые рамки':1,'Кривые':1
            },
            assembly: {
                'Непроверенные черные':1,'Непроверенные белые':1,
                'Проверенные черные':1,'Проверенные белые':1,
                'Упакованные черные':1,'Упакованные белые':1,

        // ============ ИТОГИ ДНЯ ============
        function dailySummary() {
            const today = new Date().toLocaleDateString('ru-RU');
            const todayStart = new Date().setHours(0,0,0,0);
            
            const todayHistory = history.filter(h => {
                const d = h.time.split(',')[0];
                return d === today;
            });

            if(todayHistory.length === 0) {
                toast('📅 Нет изменений за сегодня');
                return;
            }

            const summary = {};
            todayHistory.forEach(h => {
                if(!summary[h.item]) summary[h.item] = { added: 0, removed: 0, start: h.old, end: h.new };
                const diff = h.new - h.old;
                if(diff > 0) summary[h.item].added += diff;
                else summary[h.item].removed += Math.abs(diff);
                summary[h.item].start = Math.min(summary[h.item].start, h.old);
                summary[h.item].end = h.new;
            });

            let addedHtml = '', removedHtml = '';
            for(let item in summary) {
                const s = summary[item];
                if(s.added > 0) addedHtml += `<div class="history-item">🟢 <strong>${item}</strong>: +${s.added} (${s.start} → ${s.end})</div>`;
                if(s.removed > 0) removedHtml += `<div class="history-item">🔴 <strong>${item}</strong>: -${s.removed} (${s.start} → ${s.end})</div>`;
            }

            const summaryEntry = {
                time: `📅 ${today}`,
                type: 'summary',
                addedHtml, removedHtml
            };

            // Добавляем в начало истории
            history.unshift(summaryEntry);
            if(history.length > 150) history = history.slice(0, 150);
            save();
            render();
            pushToCloud();
            toast('✅ Итог дня добавлен в историю');
        }

        function autoDailySummary() {
            const lastSummary = localStorage.getItem('lastSummaryDate');
            const today = new Date().toLocaleDateString('ru-RU');
            if(lastSummary !== today) {
                localStorage.setItem('lastSummaryDate', today);
                // Проверяем есть ли изменения за вчера
                const yesterday = new Date(Date.now() - 86400000).toLocaleDateString('ru-RU');
                const hasYesterdayChanges = history.some(h => h.time && h.time.includes(yesterday));
                if(hasYesterdayChanges && history.length > 0) {
                    dailySummary();
                }
            }
        }

        function getShippedData() {
            // Сохраняем текущие значения в историю с датой
            const today = new Date().toLocaleDateString('ru-RU');
            if(!shippedHistory[today]) {
                shippedHistory[today] = {
                    black: data.assembly['Отдано черные'] || 0,
                    white: data.assembly['Отдано белые'] || 0
                };
                // Ограничиваем 365 днями
                const keys = Object.keys(shippedHistory);
                if(keys.length > 365) {
                    delete shippedHistory[keys[0]];
                }
                localStorage.setItem('sh', JSON.stringify(shippedHistory));
            } else {
                // Обновляем сегодняшние значения
                shippedHistory[today].black = data.assembly['Отдано черные'] || 0;
                shippedHistory[today].white = data.assembly['Отдано белые'] || 0;
            }

            const dates = Object.keys(shippedHistory).sort();
            let filtered = dates;
            
            if(chartPeriod > 0) {
                filtered = dates.slice(-chartPeriod);
            }

            return {
                labels: filtered,
                black: filtered.map(d => shippedHistory[d].black),
                white: filtered.map(d => shippedHistory[d].white)
            };
        }

        function drawChart() {
            const canvas = document.getElementById('chartCanvas');
            if(!canvas) return;
            
            const container = document.getElementById('chartContainer');
            canvas.width = container.offsetWidth - 40;
            canvas.height = 300;
            
            const ctx = canvas.getContext('2d');
            const chartData = getShippedData();
            
            if(chartData.labels.length === 0) {
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-secondary');
                ctx.font = '14px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillText('Нет данных для отображения', canvas.width/2, canvas.height/2);
                return;
            }

            const padding = { top: 20, right: 30, bottom: 50, left: 60 };
            const w = canvas.width - padding.left - padding.right;
            const h = canvas.height - padding.top - padding.bottom;

            // Находим максимум
            let maxVal = Math.max(...chartData.black, ...chartData.white, 1);
            maxVal = Math.ceil(maxVal * 1.1);

            // Сетка
            ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--chart-grid');
            ctx.lineWidth = 1;
            const gridLines = 5;
            for(let i = 0; i <= gridLines; i++) {
                const y = padding.top + (h / gridLines) * i;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(padding.left + w, y);
                ctx.stroke();
                
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-secondary');
                ctx.font = '11px Segoe UI';
                ctx.textAlign = 'right';
                const val = Math.round(maxVal - (maxVal / gridLines) * i);
                ctx.fillText(val, padding.left - 8, y + 4);
            }

            // Ось X
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-secondary');
            ctx.font = '10px Segoe UI';
            ctx.textAlign = 'center';
            const step = Math.max(1, Math.floor(chartData.labels.length / 7));
            chartData.labels.forEach((label, i) => {
                if(i % step === 0 || i === chartData.labels.length - 1) {
                    const x = padding.left + (w / (chartData.labels.length - 1 || 1)) * i;
                    ctx.fillText(label.split('.').slice(0,2).join('.'), x, padding.top + h + 18);
                }
            });

            // Функция отрисовки линии с анимацией
            const drawLine = (data, color, progress) => {
                ctx.strokeStyle = color;
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                
                const points = data.length - 1;
                const endIdx = Math.floor(points * progress);
                
                data.forEach((val, i) => {
                    const x = padding.left + (w / (points || 1)) * i;
                    const y = padding.top + h - (val / maxVal) * h;
                    if(i === 0) ctx.moveTo(x, y);
                    else if(i <= endIdx) ctx.lineTo(x, y);
                });
                ctx.stroke();

                // Точки
                data.forEach((val, i) => {
                    if(i <= endIdx) {
                        const x = padding.left + (w / (points || 1)) * i;
                        const y = padding.top + h - (val / maxVal) * h;
                        ctx.fillStyle = color;
                        ctx.beginPath();
                        ctx.arc(x, y, 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
            };

            // Анимация
            if(chartAnimFrame) cancelAnimationFrame(chartAnimFrame);
            let progress = 0;
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Перерисовываем сетку
                ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--chart-grid');
                ctx.lineWidth = 1;
                for(let i = 0; i <= gridLines; i++) {
                    const y = padding.top + (h / gridLines) * i;
                    ctx.beginPath(); ctx.moveTo(padding.left, y);
                    ctx.lineTo(padding.left + w, y); ctx.stroke();
                    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-secondary');
                    ctx.fillText(Math.round(maxVal - (maxVal / gridLines) * i), padding.left - 8, y + 4);
                }
                
                chartData.labels.forEach((label, i) => {
                    if(i % step === 0 || i === chartData.labels.length - 1) {
                        const x = padding.left + (w / (chartData.labels.length - 1 || 1)) * i;
                        ctx.fillText(label.split('.').slice(0,2).join('.'), x, padding.top + h + 18);
                    }
                });

                drawLine(chartData.black, '#2d3436', progress);
                drawLine(chartData.white, '#b2bec3', progress);
                
                // Легенда
                ctx.fillStyle = '#2d3436';
                ctx.fillRect(padding.left, padding.top - 12, 12, 12);
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-primary');
                ctx.textAlign = 'left';
                ctx.fillText('Черные', padding.left + 18, padding.top);
                
                ctx.fillStyle = '#b2bec3';
                ctx.fillRect(padding.left + 80, padding.top - 12, 12, 12);
                ctx.fillText('Белые', padding.left + 98, padding.top);

                progress += 0.05;
                if(progress <= 1) {
                    chartAnimFrame = requestAnimationFrame(animate);
                }
            };
            animate();

            // Сохраняем данные для tooltip
            canvas._chartData = chartData;
            canvas._padding = padding;
            canvas._maxVal = maxVal;
        }

        // Tooltip при наведении
        document.addEventListener('mousemove', function(e) {
            const canvas = document.getElementById('chartCanvas');
            if(!canvas || !canvas._chartData) return;
            
            const tooltip = document.getElementById('chartTooltip');
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const data = canvas._chartData;
            const pad = canvas._padding;
            const w = canvas.width - pad.left - pad.right;
            
            const points = data.labels.length - 1;
            if(points <= 0) return;
            
            const step = w / points;
            const idx = Math.round((x - pad.left) / step);
            
            if(idx >= 0 && idx < data.labels.length && 
               x >= pad.left && x <= pad.left + w &&
               y >= pad.top && y <= pad.top + (canvas.height - pad.top - pad.bottom)) {
                
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
                tooltip.style.top = (e.clientY - rect.top - 30) + 'px';
                tooltip.innerHTML = `
                    📅 ${data.labels[idx]}<br>
                    ⚫ Черные: <strong>${data.black[idx]}</strong><br>
                    ⚪ Белые: <strong>${data.white[idx]}</strong>
                `;
            } else {
                tooltip.style.display = 'none';
            }
        });

        function save() {
            localStorage.setItem('pd',JSON.stringify(data)); localStorage.setItem('pl',JSON.stringify(limits));
            localStorage.setItem('ph',JSON.stringify(history)); localStorage.setItem('pn',JSON.stringify(notes));
            localStorage.setItem('pg',JSON.stringify(goals)); localStorage.setItem('sh',JSON.stringify(shippedHistory));

        function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',1500); }

        // ============ SYNC ============
        function startAutoSync() { stopAutoSync(); syncTimer=setInterval(syncData,SYNC_INTERVAL); }
        function stopAutoSync() { if(syncTimer){clearInterval(syncTimer);syncTimer=null;} }
        async function loadFromCloud() {
            if(!isOnline) return;
            try {
                updateSyncStatus('sync-loading','🔄 Загрузка...');
                const r=await fetch(SYNC_URL+'?t='+Date.now()); const c=JSON.parse(await r.text());
                const lt=parseInt(localStorage.getItem('lt')||'0'), ct=c.t||0;
                if(c.d&&(isFirstSync||ct>lt)){
                    data=c.d; if(c.l) limits=c.l; if(c.h) history=c.h; if(c.n) notes=c.n; if(c.g) goals=c.g;
                    localStorage.setItem('lt',ct); render(); updateStats(); renderNotes(); renderGoals();
                    updateSyncStatus('sync-online','🟢 Загружено');
                } else if(ct<lt) await pushToCloud();
                else updateSyncStatus('sync-online','🟢 OK');
                isFirstSync=false;
            } catch(e) { updateSyncStatus('sync-error','🔴 Ошибка'); }
        }
        async function pushToCloud() {
            if(!isOnline) { save(); return; }
            const ts=Date.now(), p=JSON.stringify({d:data,l:limits,h:history.slice(0,30),n:notes,g:goals,t:ts});
            try {
                updateSyncStatus('sync-loading','🔄 Отправка...');
                await fetch(SYNC_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:p});
                localStorage.setItem('lt',ts); updateSyncStatus('sync-online','🟢 OK');
            } catch(e) { updateSyncStatus('sync-error','🔴 Ошибка'); save(); }
        }
        async function syncData() {
            if(!isOnline) return;
            try {
                const r=await fetch(SYNC_URL+'?t='+Date.now()); const c=JSON.parse(await r.text());
                const lt=parseInt(localStorage.getItem('lt')||'0'), ct=c.t||0;
                if(c.d&&ct>lt){
                    data=c.d; if(c.l) limits=c.l; if(c.h) history=c.h; if(c.n) notes=c.n; if(c.g) goals=c.g;
                    localStorage.setItem('lt',ct); render(); updateStats(); renderNotes(); renderGoals();
                    updateSyncStatus('sync-online','🟢 Обновлено');
                } else if(ct<lt) await pushToCloud();
                else updateSyncStatus('sync-online','🟢 OK');
            } catch(e) { updateSyncStatus('sync-error','🔴 Ошибка'); }
        }

        function updateValue(cat,item,delta) {
            const old=data[cat][item]; data[cat][item]=Math.max(0,old+delta);
            history.unshift({time:new Date().toLocaleString('ru-RU'),user:currentUser,item,old,new:data[cat][item],act:delta>0?'+'+delta:delta});
            if(history.length>150) history=history.slice(0,150);
            // Сохраняем в shippedHistory
            const today=new Date().toLocaleDateString('ru-RU');
            if(!shippedHistory[today]) shippedHistory[today]={black:data.assembly['Отдано черные']||0,white:data.assembly['Отдано белые']||0};
            render(); checkAlerts(); save(); pushToCloud();
        }
        function setValue(cat,item,val) {
            const old=data[cat][item]; data[cat][item]=Math.max(0,parseInt(val)||0);
            history.unshift({time:new Date().toLocaleString('ru-RU'),user:currentUser,item,old,new:data[cat][item],act:'ввод'});
            if(history.length>150) history=history.slice(0,150);
            const today=new Date().toLocaleDateString('ru-RU');
            if(!shippedHistory[today]) shippedHistory[today]={black:data.assembly['Отдано черные']||0,white:data.assembly['Отдано белые']||0};
            render(); checkAlerts(); save(); pushToCloud();
        }
        function checkAlerts() {
            const bs={};
            for(let c in data) for(let i in data[c]) { const v=data[c][i],min=limits[i]??0; if(v<=min){ if(!bs[c])bs[c]=[]; bs[c].push({i,v,min}); } }
            const d=document.getElementById('alerts'), tc=Object.values(bs).reduce((s,a)=>s+a.length,0);
            if(tc>0){
                let h=`<div class="alert-box"><div class="alert-header" onclick="toggleAlerts()"><h3>⚠️ Критические запасы (${tc})</h3><span id="alertsArrow">${alertsOpen?'▼':'▶'}</span></div><div class="alert-body ${alertsOpen?'':'hidden'}">`;
                for(let s in bs){ h+=`<div class="alert-section-title">${sectionNames[s]||s}:</div>`; bs[s].forEach(x=>h+=`<div class="alert-item">🔴 ${x.i}: ${x.v} ед. (мин: ${x.min})</div>`); }
                h+=`</div></div>`; d.innerHTML=h;
            } else d.innerHTML='';
        }
        function toggleAlerts() {
            alertsOpen=!alertsOpen; const b=document.querySelector('.alert-body'); if(b)b.classList.toggle('hidden',!alertsOpen);
            const a=document.getElementById('alertsArrow'); if(a)a.textContent=alertsOpen?'▼':'▶';
        }
        function createItem(cat,item,val,sub) {
            const min=limits[item]??0, crit=val<=min;
            return `<div class="${sub?'sub-item':'item'}"><div class="item-name"><span>${item} <span class="min-badge" onclick="quickEditLimit('${item}')">мин:${min}</span></span><span class="item-value ${crit?'critical-low':''}">${val}</span></div><div class="item-controls"><button class="btn btn-m10" onclick="updateValue('${cat}','${item}',-10)">-10</button><button class="btn btn-m1" onclick="updateValue('${cat}','${item}',-1)">-1</button><input type="number" class="qty-input" value="${val}" min="0" onchange="setValue('${cat}','${item}',this.value)"><button class="btn btn-p1" onclick="updateValue('${cat}','${item}',1)">+1</button><button class="btn btn-p10" onclick="updateValue('${cat}','${item}',10)">+10</button></div></div>`;
        }
        function render() {
            let s='<h3 class="subsection-title">Скотч</h3>';
            s+=createItem('supplies','Скотч желтый',data.supplies['Скотч желтый'],true);
            s+=createItem('supplies','Скотч прозрачный',data.supplies['Скотч прозрачный'],true);
            s+='<h3 class="subsection-title">Крючки</h3>';
            s+=createItem('supplies','Крючки черные',data.supplies['Крючки черные'],true);
            s+=createItem('supplies','Крючки белые',data.supplies['Крючки белые'],true);
            s+='<h3 class="subsection-title">Прочее</h3>';
            ['Стрэйтч','Пластик белый','Коробки','Грунт','Пупырка'].forEach(i=>s+=createItem('supplies',i,data.supplies[i]));
            s+='<h3 class="subsection-title">Рамки</h3>';
            s+=createItem('supplies','Рамки черные',data.supplies['Рамки черные'],true);
            s+=createItem('supplies','Рамки белые',data.supplies['Рамки белые'],true);
            ['Оргстекло','Доски'].forEach(i=>s+=createItem('supplies',i,data.supplies[i]));
            document.getElementById('supplies').innerHTML=s;
            document.getElementById('production').innerHTML=Object.keys(data.production).map(i=>createItem('production',i,data.production[i])).join('');
            let a='<h3 class="subsection-title">Непроверенные</h3>';
            a+=createItem('assembly','Непроверенные черные',data.assembly['Непроверенные черные'],true);
            a+=createItem('assembly','Непроверенные белые',data.assembly['Непроверенные белые'],true);
            a+='<h3 class="subsection-title">Проверенные</h3>';
            a+=createItem('assembly','Проверенные черные',data.assembly['Проверенные черные'],true);
            a+=createItem('assembly','Проверенные белые',data.assembly['Проверенные белые'],true);
            a+='<h3 class="subsection-title">Упакованные</h3>';
            a+=createItem('assembly','Упакованные черные',data.assembly['Упакованные черные'],true);
            a+=createItem('assembly','Упакованные белые',data.assembly['Упакованные белые'],true);
            a+='<h3 class="subsection-title">Отдано</h3>';
            a+=createItem('assembly','Отдано черные',data.assembly['Отдано черные'],true);
            a+=createItem('assembly','Отдано белые',data.assembly['Отдано белые'],true);
            document.getElementById('assembly').innerHTML=a;
            checkAlerts();
            // Рендер истории с поддержкой summary
            const hDiv=document.getElementById('historyList');
            hDiv.innerHTML=history.length===0?'<p style="color:var(--text-secondary)">Пусто</p>':
                history.map(r=>{
                    if(r.type==='summary'){
                        let html = `<div class="history-summary added"><strong>📅 ИТОГ ДНЯ</strong></div>`;
                        if(r.addedHtml) html += r.addedHtml;
                        if(r.removedHtml) html += r.removedHtml;
                        return html;
                    }
                    return `<div class="history-item"><span style="color:${USER_COLORS[r.user]||'#636e72'};font-weight:600">${r.user||'?'}</span> <strong>${r.time}</strong> - "${r.item}": ${r.old} → ${r.new} (${r.act})</div>`;
                }).join('');
        }
        function clearHistory() { if(confirm('Очистить историю?')){history=[];save();render();pushToCloud();} }
        function updateStats() {
            const shipped=(data.assembly['Отдано черные']||0)+(data.assembly['Отдано белые']||0);
            let crit=0; for(let c in data) for(let i in data[c]) if(data[c][i]<=(limits[i]??0)) crit++;
            document.getElementById('statsGrid').innerHTML=`
                <div class="stat-card"><h4>Синхронизация</h4><div class="stat-value" style="font-size:24px">${isOnline?'🟢':'🟡'}</div></div>
                <div class="stat-card"><h4>Отгружено всего</h4><div class="stat-value">${shipped}</div></div>
                <div class="stat-card"><h4>Критических запасов</h4><div class="stat-value" style="color:var(--danger-red)">${crit}</div></div>`;
        }

        initAuth();
    </script>
</body>
</html>
