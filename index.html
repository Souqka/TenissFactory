<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Управление производством</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏭</text></svg>">
    <style>
        :root {
            --bg: #fff; --bg2: #f8faf8; --txt: #2d3436; --txt2: #636e72;
            --brd: #a8e6cf; --brd2: #dcedc1; --green: #4caf50; --red: #ff6b6b;
            --shadow: 0 2px 8px rgba(0,0,0,.1); --card: #fff; --hover: #f0f7f0;
            --blue: #74b9ff; --yellow: #ffd93d; --grid: #e0e0e0;
        }
        [data-theme="dark"] {
            --bg: #1a1a2e; --bg2: #16213e; --txt: #e0e0e0; --txt2: #a0a0a0;
            --brd: #2d5a3d; --brd2: #1e3a2f; --green: #66bb6a; --red: #ef5350;
            --shadow: 0 2px 8px rgba(0,0,0,.4); --card: #222831; --hover: #2d3a2d;
            --grid: #3a3a4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt);
            transition: all .3s; touch-action: manipulation; -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .auth-overlay.hidden { display: none; }
        .auth-card { background: var(--card); border-radius: 20px; padding: 40px; border: 2px solid var(--brd); box-shadow: var(--shadow); text-align: center; max-width: 400px; width: 90%; }
        .auth-card h2 { color: var(--green); margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid var(--brd); border-radius: 10px; font-size: 24px; text-align: center; letter-spacing: 10px; background: var(--bg); color: var(--txt); }
        .auth-input:focus { outline: none; border-color: var(--green); }
        .user-list { display: flex; flex-direction: column; gap: 8px; margin: 15px 0; }
        .user-btn { padding: 12px; border: 2px solid var(--brd); border-radius: 10px; background: var(--card); color: var(--txt); cursor: pointer; font-size: 16px; transition: all .3s; text-align: left; }
        .user-btn:hover { background: var(--green); color: #fff; border-color: var(--green); }
        .custom-user-btn { font-style: italic; }
        .app-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: var(--card); border-radius: 15px; border: 2px solid var(--brd); box-shadow: var(--shadow); flex-wrap: wrap; gap: 10px; }
        .header h1 { color: var(--green); font-size: clamp(18px, 4vw, 24px); }
        .header-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; background: var(--hover); color: var(--txt); cursor: pointer; border: 2px solid var(--brd); }
        .badge:hover { background: var(--green); color: #fff; }
        .sync { padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; }
        .sync-online { background: #d4edda; color: #155724; }
        .sync-offline { background: #fff3cd; color: #856404; }
        .sync-error { background: #f8d7da; color: #721c24; }
        .sync-loading { background: #cce5ff; color: #004085; }
        [data-theme="dark"] .sync-online { background: #1e3a2f; color: #66bb6a; }
        [data-theme="dark"] .sync-offline { background: #3d3520; color: #ffd54f; }
        [data-theme="dark"] .sync-error { background: #3d2020; color: #ef5350; }
        [data-theme="dark"] .sync-loading { background: #1a2a3d; color: #66b0ff; }
        .btn-sm { padding: 8px 14px; border: 2px solid var(--brd); border-radius: 8px; background: var(--card); color: var(--txt); cursor: pointer; transition: all .3s; font-size: 13px; white-space: nowrap; }
        .btn-sm:hover { background: var(--hover); }
        .btn-sm.active { background: var(--green); color: #fff; border-color: var(--green); }
        .sections-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 350px), 1fr)); gap: 20px; margin-bottom: 25px; }
        .section-box { background: var(--card); border-radius: 15px; padding: 20px; border: 2px solid var(--brd); box-shadow: var(--shadow); }
        .section-title { color: var(--green); font-size: clamp(16px, 3vw, 20px); margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid var(--brd2); }
        .subsection-title { color: var(--txt); font-size: 14px; margin: 12px 0 8px; font-weight: 600; }
        .inventory-item { margin-bottom: 12px; padding: 12px; background: var(--bg2); border-radius: 10px; border: 1px solid var(--brd2); }
        .inventory-item.sub { margin-left: 15px; padding: 8px; background: var(--bg); }
        .item-name { font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; font-size: clamp(12px, 2.5vw, 14px); }
        .item-value { font-size: clamp(14px, 3vw, 18px); font-weight: bold; }
        .critical { color: var(--red); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .min-badge { font-size: 11px; padding: 2px 6px; border-radius: 10px; background: var(--brd2); color: var(--txt2); cursor: pointer; }
        .min-badge:hover { background: var(--green); color: #fff; }
        .item-controls { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .qty-input { width: 60px; padding: 6px; border: 2px solid var(--brd); border-radius: 6px; text-align: center; font-size: 14px; background: var(--bg); color: var(--txt); }
        .qty-input:focus { outline: none; border-color: var(--green); }
        .btn { padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: all .3s; color: #fff; min-width: 35px; }
        .btn-minus10 { background: #e74c3c; }
        .btn-minus1 { background: #ff7675; }
        .btn-plus1 { background: #55efc4; color: #2d3436; }
        .btn-plus10 { background: #00b894; }
        .btn:hover { transform: scale(1.05); opacity: .9; }
        .btn:active { transform: scale(.95); }
        .panel { background: var(--card); border-radius: 15px; padding: 20px; border: 2px solid var(--brd); box-shadow: var(--shadow); margin-bottom: 25px; }
        .history-list { max-height: 350px; overflow-y: auto; }
        .history-item { padding: 10px; border-bottom: 1px solid var(--brd2); font-size: 13px; color: var(--txt2); }
        .history-item:last-child { border-bottom: none; }
        .history-summary { padding: 10px; border-radius: 8px; margin: 5px 0; font-weight: bold; font-size: 14px; }
        .history-summary.added { background: #d4edda; color: #155724; }
        .history-summary.removed { background: #f8d7da; color: #721c24; }
        [data-theme="dark"] .history-summary.added { background: #1e3a2f; color: #66bb6a; }
        [data-theme="dark"] .history-summary.removed { background: #3d2020; color: #ef5350; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 15px; }
        .stat-card { background: var(--bg2); padding: 15px; border-radius: 10px; border: 1px solid var(--brd2); text-align: center; }
        .stat-card h4 { color: var(--txt2); margin-bottom: 8px; font-size: 13px; }
        .stat-value { font-size: clamp(24px, 5vw, 32px); font-weight: bold; color: var(--green); }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 8px 16px; border: 2px solid var(--brd); border-radius: 8px; background: var(--card); color: var(--txt); cursor: pointer; font-size: 14px; transition: all .3s; white-space: nowrap; }
        .tab.active { background: var(--green); color: #fff; border-color: var(--green); }
        .tab:hover { background: var(--hover); }
        .tab.active:hover { background: var(--green); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .alert-box { background: #fff3f3; border: 2px solid var(--red); border-radius: 10px; padding: 12px; margin-bottom: 15px; }
        [data-theme="dark"] .alert-box { background: #3d2020; }
        .alert-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .alert-header h3 { color: var(--red); margin: 0; font-size: 16px; }
        .alert-body { margin-top: 10px; }
        .alert-body.hidden { display: none; }
        .alert-item { color: var(--red); padding: 4px 0; font-size: 13px; }
        .alert-section { color: var(--red); font-weight: 600; margin: 8px 0 4px; font-size: 14px; }
        .limits-panel { background: var(--card); border-radius: 15px; padding: 20px; border: 2px solid var(--yellow); box-shadow: var(--shadow); margin-bottom: 25px; display: none; }
        .limits-panel.show { display: block; }
        .limits-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; margin-top: 15px; }
        .limit-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--bg2); border-radius: 8px; border: 1px solid var(--brd2); font-size: 13px; }
        .limit-name { font-weight: 600; flex: 1; }
        .limit-controls { display: flex; align-items: center; gap: 6px; }
        .limit-input { width: 60px; padding: 5px; border: 2px solid var(--brd); border-radius: 6px; text-align: center; font-size: 13px; background: var(--bg); color: var(--txt); }
        .pinboard { background: var(--card); border-radius: 15px; padding: 15px; border: 2px solid var(--blue); box-shadow: var(--shadow); margin-bottom: 15px; }
        .pinboard-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .pinboard-header h2 { color: var(--blue); font-size: 18px; margin: 0; }
        .pinboard-body { margin-top: 12px; }
        .pinboard-body.hidden { display: none; }
        .note-card { background: var(--bg2); border-radius: 10px; padding: 12px; margin-bottom: 8px; border: 1px solid var(--brd2); font-size: 13px; }
        .note-card.done { opacity: .6; border-left: 4px solid var(--green); }
        .note-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 5px; }
        .note-text { font-size: 14px; margin-bottom: 6px; word-break: break-word; }
        .note-meta { display: flex; gap: 10px; font-size: 11px; color: var(--txt2); flex-wrap: wrap; }
        .note-actions { display: flex; gap: 4px; margin-top: 6px; }
        .note-btn { padding: 3px 8px; border: 1px solid var(--brd); border-radius: 4px; background: var(--card); color: var(--txt); cursor: pointer; font-size: 11px; }
        .note-btn.done-btn { color: var(--green); border-color: var(--green); }
        .note-btn.delete-btn { color: var(--red); border-color: var(--red); }
        .note-btn.edit-btn { color: var(--blue); border-color: var(--blue); }
        .add-note-form { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; padding: 12px; background: var(--bg2); border-radius: 10px; border: 1px dashed var(--brd); }
        .add-note-form input, .add-note-form select { padding: 8px; border: 2px solid var(--brd); border-radius: 8px; font-size: 13px; background: var(--bg); color: var(--txt); flex: 1; min-width: 120px; }
        .goal-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--bg2); border-radius: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .goal-label { font-weight: 600; min-width: 80px; font-size: 14px; }
        .goal-input { width: 70px; padding: 6px; border: 2px solid var(--brd); border-radius: 6px; text-align: center; font-size: 14px; background: var(--bg); color: var(--txt); }
        .goal-progress { font-size: 14px; font-weight: bold; padding: 4px 10px; border-radius: 10px; }
        .goal-done { background: #d4edda; color: #155724; }
        .goal-pending { background: #fff3cd; color: #856404; }
        .chart-wrapper { position: relative; width: 100%; max-width: 800px; margin: 20px auto; background: var(--bg2); border-radius: 15px; padding: 20px; }
        canvas { display: block; width: 100%; cursor: crosshair; }
        .chart-controls { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
        .chart-tooltip { position: absolute; background: var(--card); color: var(--txt); padding: 6px 10px; border-radius: 6px; font-size: 12px; pointer-events: none; display: none; z-index: 10; border: 1px solid var(--brd); box-shadow: var(--shadow); }
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #fff; padding: 10px 20px; border-radius: 20px; box-shadow: var(--shadow); display: none; z-index: 999; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg2); }
        ::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 3px; }
        @media (max-width: 768px) {
            .app-container { padding: 10px; }
            .sections-grid { grid-template-columns: 1fr; gap: 15px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .header { padding: 12px; gap: 8px; }
            .header h1 { font-size: 18px; }
            .btn-sm { padding: 6px 10px; font-size: 11px; }
            .tabs { gap: 5px; }
            .tab { padding: 6px 10px; font-size: 12px; }
            .limits-grid { grid-template-columns: 1fr; }
            .add-note-form { flex-direction: column; }
            .section-box { padding: 15px; }
            .inventory-item { padding: 10px; }
            .btn { padding: 5px 8px; font-size: 11px; min-width: 30px; }
            .qty-input { width: 50px; padding: 5px; font-size: 12px; }
            .chart-wrapper { padding: 10px; }
        }
        @media (max-width: 400px) {
            .header-controls { gap: 4px; }
            .btn-sm { padding: 5px 8px; font-size: 10px; }
            .stats-grid { grid-template-columns: 1fr; }
            .goal-item { flex-direction: column; align-items: flex-start; }
            .tab { padding: 5px 8px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="auth-overlay" id="authOverlay"><div class="auth-card" id="authCard"></div></div>
    <div class="app-container" id="appContainer" style="display:none">
        <header class="header">
            <h1>🏭 Производство</h1>
            <div class="header-controls">
                <span class="badge" onclick="switchUser()" id="userBadge">👤</span>
                <span class="sync sync-loading" id="syncStatus">🔄</span>
                <button class="btn-sm" onclick="syncNow()">🔄</button>
                <button class="btn-sm" onclick="dailySummary()">📅 Итог</button>
                <button class="btn-sm" onclick="toggleLimits()" id="limitsBtn">⚙️</button>
                <button class="btn-sm" onclick="toggleTheme()">🌙</button>
            </div>
        </header>
        <div class="limits-panel" id="limitsPanel">
            <h2 class="section-title">⚙️ Минимальные запасы</h2>
            <p style="color:var(--txt2);margin-bottom:10px;font-size:13px">Установите 0 чтобы отключить отслеживание критических запасов для позиции.</p>
            <div class="limits-grid" id="limitsGrid"></div>
            <div style="margin-top:15px;text-align:right"><button class="btn btn-plus10" onclick="saveLimits()">💾 Сохранить</button></div>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('inventory')">📦 Производство</button>
            <button class="tab" onclick="switchTab('history')">📋 История</button>
            <button class="tab" onclick="switchTab('stats')">📊 Статистика</button>
            <button class="tab" onclick="switchTab('chart')">📈 График</button>
            <button class="tab" onclick="switchTab('goals')">🎯 Цели</button>
        </div>
        <div id="tab-inventory" class="tab-content active">
            <div id="alerts"></div>
            <div class="pinboard" id="pinboard">
                <div class="pinboard-header" onclick="togglePinboard()">
                    <h2>📌 Записки <span id="noteCount">[0]</span></h2>
                    <span id="pinboardArrow">▼</span>
                </div>
                <div class="pinboard-body" id="pinboardBody">
                    <div id="notesList"></div>
                    <div class="add-note-form">
                        <input type="text" id="newNoteText" placeholder="Текст записки..." maxlength="200">
                        <select id="newNoteAssignee"><option value="">Исполнитель...</option></select>
                        <button class="btn btn-plus10" onclick="addNote()">+</button>
                    </div>
                </div>
            </div>
            <div class="sections-grid">
                <div class="section-box"><h2 class="section-title">📦 Отдел 1: Запасы</h2><div id="supplies"></div></div>
                <div class="section-box"><h2 class="section-title">⚙️ Отдел 2: Производство</h2><div id="production"></div></div>
                <div class="section-box"><h2 class="section-title">🔧 Отдел 3: Сборка</h2><div id="assembly"></div></div>
            </div>
        </div>
        <div id="tab-history" class="tab-content">
            <div class="panel">
                <h2 class="section-title">📋 История изменений</h2>
                <div style="margin-bottom:15px;display:flex;gap:10px">
                    <button class="btn btn-minus10" onclick="clearHistory()">🗑️ Очистить</button>
                    <button class="btn btn-plus10" onclick="dailySummary()">📅 Итог дня</button>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
        <div id="tab-stats" class="tab-content">
            <div class="panel"><h2 class="section-title">📊 Статистика</h2><div class="stats-grid" id="statsGrid"></div></div>
        </div>
        <div id="tab-chart" class="tab-content">
            <div class="panel">
                <h2 class="section-title">📈 График отданных рамок</h2>
                <div class="chart-controls">
                    <button class="btn-sm active period-btn" onclick="changeChartPeriod(7, this)">7 дней</button>
                    <button class="btn-sm period-btn" onclick="changeChartPeriod(30, this)">30 дней</button>
                    <button class="btn-sm period-btn" onclick="changeChartPeriod(0, this)">Всё время</button>
                </div>
                <div class="chart-wrapper" id="chartContainer">
                    <canvas id="chartCanvas"></canvas>
                    <div class="chart-tooltip" id="chartTooltip"></div>
                </div>
            </div>
        </div>
        <div id="tab-goals" class="tab-content">
            <div class="panel"><h2 class="section-title">🎯 Цели на день</h2><div id="goalsContent"></div></div>
        </div>
    </div>
    <div class="toast" id="toast">✓ Сохранено</div>

    <script>
    // ===== КОНФИГУРАЦИЯ =====
    var SYNC_URL = 'https://script.google.com/macros/s/AKfycbzTeiQslDVeA9Zcyr9HodMjda76w5RA6LM0h8_NV2Y7T-0hyHAU1KZVH545ZsuD7CV1iw/exec';
    var SYNC_INTERVAL = 15000;
    var PASSWORD = '0000';  // ← ПОМЕНЯТЬ ПАРОЛЬ ЗДЕСЬ
    var USER_LIST = ['Илья', 'Глеб', 'Артур', 'Наём. Раб.'];
    var USER_COLORS = {
        'Илья': '#3498db',
        'Глеб': '#e67e22',
        'Артур': '#9b59b6',
        'Наём. Раб.': '#95a5a6'
    };
    var SECTION_NAMES = {
        supplies: '📦 Запасы',
        production: '⚙️ Производство',
        assembly: '🔧 Сборка'
    };
    var SUPPLIES_ORDER = ['Стрэйтч', 'Пластик белый', 'Коробки', 'Грунт', 'Пупырка'];

    // ===== НАЧАЛЬНЫЕ ДАННЫЕ =====
    var DEFAULT_PRODUCTION_DATA = {
        supplies: {
            'Скотч желтый': 1, 'Скотч прозрачный': 1, 'Стрэйтч': 1,
            'Крючки черные': 1, 'Крючки белые': 1, 'Пластик белый': 1,
            'Коробки': 1, 'Грунт': 1, 'Пупырка': 1,
            'Рамки черные': 1, 'Рамки белые': 1, 'Оргстекло': 1, 'Доски': 1
        },
        production: {
            'Пластик нарезанный': 1, 'Сушка грунта': 1, 'Сушка полей': 1,
            'Готовые рамки': 1, 'Кривые': 1
        },
        assembly: {
            'Непроверенные черные': 1, 'Непроверенные белые': 1,
            'Проверенные черные': 1, 'Проверенные белые': 1,
            'Упакованные черные': 1, 'Упакованные белые': 1,
            'Отдано черные': 1, 'Отдано белые': 1
        }
    };

    var DEFAULT_LIMITS = {};
    for (var category in DEFAULT_PRODUCTION_DATA) {
        for (var item in DEFAULT_PRODUCTION_DATA[category]) {
            DEFAULT_LIMITS[item] = 1;
        }
    }

    // ===== СОСТОЯНИЕ =====
    var productionData = JSON.parse(localStorage.getItem('productionData') || JSON.stringify(DEFAULT_PRODUCTION_DATA));
    var minLimits = JSON.parse(localStorage.getItem('minLimits') || JSON.stringify(DEFAULT_LIMITS));
    var changeHistory = JSON.parse(localStorage.getItem('changeHistory') || '[]');
    var notes = JSON.parse(localStorage.getItem('notes') || '[]');
    var dailyGoals = JSON.parse(localStorage.getItem('dailyGoals') || '{"total": 100}');
    var shippedHistory = JSON.parse(localStorage.getItem('shippedHistory') || '{}');
    var darkMode = JSON.parse(localStorage.getItem('darkMode') || 'false');
    var currentUser = localStorage.getItem('currentUser') || null;

    var showLimitsPanel = false;
    var pinboardOpen = true;
    var alertsOpen = true;
    var isFirstSync = true;
    var chartPeriod = 7;
    var syncTimer = null;
    var chartAnimation = null;
    var isOnline = navigator.onLine;

    // ===== СОХРАНЕНИЕ =====
    function saveAllData() {
        localStorage.setItem('productionData', JSON.stringify(productionData));
        localStorage.setItem('minLimits', JSON.stringify(minLimits));
        localStorage.setItem('changeHistory', JSON.stringify(changeHistory));
        localStorage.setItem('notes', JSON.stringify(notes));
        localStorage.setItem('dailyGoals', JSON.stringify(dailyGoals));
        localStorage.setItem('shippedHistory', JSON.stringify(shippedHistory));
        localStorage.setItem('darkMode', JSON.stringify(darkMode));

    // ===== ИЗМЕНЕНИЕ ЗНАЧЕНИЙ =====
    function changeItemValue(category, item, delta) {
        var oldValue = productionData[category][item];
        if (typeof delta === 'string') {
            productionData[category][item] = Math.max(0, parseInt(delta) || 0);
            var action = 'ввод';
        } else {
            productionData[category][item] = Math.max(0, oldValue + delta);
            var action = delta > 0 ? '+' + delta : '' + delta;
        }
        changeHistory.unshift({
            time: new Date().toLocaleString('ru-RU'),
            user: currentUser,
            item: item,
            old: oldValue,
            new: productionData[category][item],
            act: action
        });
        if (changeHistory.length > 150) changeHistory = changeHistory.slice(0, 150);
        var today = new Date().toLocaleDateString('ru-RU');
        if (!shippedHistory[today]) {
            shippedHistory[today] = {
                black: productionData.assembly['Отдано черные'] || 0,
                white: productionData.assembly['Отдано белые'] || 0
            };
        }
        renderAll();
        checkAlerts();
        saveAllData();
        pushToCloud();
    }

        var minLimit = minLimits[item] || 0;

        return '<div class="inventory-item' + (isSubItem ? ' sub' : '') + '">' +
            '<div class="item-name">' +
                '<span>' + item + ' <span class="min-badge" onclick="quickEditLimit(\'' + item + '\')">мин:' + minLimit + '</span></span>' +
                '<span class="item-value' + (isCritical ? ' critical' : '') + '">' + value + '</span>' +
            '</div>' +
            '<div class="item-controls">' +
                '<button class="btn btn-minus10" onclick="changeItemValue(\'' + category + '\',\'' + item + '\',-10)">-10</button>' +
                '<button class="btn btn-minus1" onclick="changeItemValue(\'' + category + '\',\'' + item + '\',-1)">-1</button>' +
                '<input type="number" class="qty-input" value="' + value + '" min="0" onchange="changeItemValue(\'' + category + '\',\'' + item + '\',this.value)">' +
                '<button class="btn btn-plus1" onclick="changeItemValue(\'' + category + '\',\'' + item + '\',1)">+1</button>' +
                '<button class="btn btn-plus10" onclick="changeItemValue(\'' + category + '\',\'' + item + '\',10)">+10</button>' +

    // ===== КРИТИЧЕСКИЕ ЗАПАСЫ =====
    function checkAlerts() {
        var criticalBySection = {};
        for (var category in productionData) {
            for (var item in productionData[category]) {
                if (item === 'Крючки') continue;
                var value = productionData[category][item];
                var minLimit = minLimits[item] || 0;
                if (minLimit > 0 && value <= minLimit) {
                    if (!criticalBySection[category]) criticalBySection[category] = [];
                    criticalBySection[category].push({ name: item, value: value, min: minLimit });
                }
            }
        }
        var totalCritical = 0;
        for (var section in criticalBySection) { totalCritical += criticalBySection[section].length; }
        var alertsDiv = document.getElementById('alerts');
        if (totalCritical > 0) {
            var html = '<div class="alert-box">' +
                '<div class="alert-header" onclick="toggleAlerts()">' +
                    '<h3>⚠️ Критические запасы (' + totalCritical + ')</h3>' +
                    '<span id="alertsArrow">' + (alertsOpen ? '▼' : '▶') + '</span>' +
                '</div>' +
                '<div class="alert-body' + (alertsOpen ? '' : ' hidden') + '">';
            for (var section in criticalBySection) {
                html += '<div class="alert-section">' + (SECTION_NAMES[section] || section) + ':</div>';
                criticalBySection[section].forEach(function(item) {
                    html += '<div class="alert-item">🔴 ' + item.name + ': ' + item.value + ' ед. (мин: ' + item.min + ')</div>';
                });
            }
            html += '</div></div>';
            alertsDiv.innerHTML = html;
        } else {
            alertsDiv.innerHTML = '';
        }
    }

    function toggleAlerts() {
        alertsOpen = !alertsOpen;
        var body = document.querySelector('.alert-body');
        if (body) body.classList.toggle('hidden', !alertsOpen);
        var arrow = document.getElementById('alertsArrow');
        if (arrow) arrow.textContent = alertsOpen ? '▼' : '▶';
    }

    // ===== ИТОГИ ДНЯ =====
    function dailySummary() {
        var today = new Date().toLocaleDateString('ru-RU');
        var todayHistory = changeHistory.filter(function(h) { return h.time && h.time.split(',')[0] === today; });
        if (todayHistory.length === 0) { showToast('📅 Нет изменений за сегодня'); return; }
        var summary = {};
        todayHistory.forEach(function(h) {
            if (!summary[h.item]) summary[h.item] = { added: 0, removed: 0, start: h.old, end: h.new };
            var diff = h.new - h.old;
            if (diff > 0) summary[h.item].added += diff;
            else summary[h.item].removed += Math.abs(diff);
            summary[h.item].start = Math.min(summary[h.item].start, h.old);
            summary[h.item].end = h.new;
        });
        var addedHTML = '', removedHTML = '';
        for (var item in summary) {
            var s = summary[item];
            if (s.added > 0) addedHTML += '<div class="history-item">🟢 <strong>' + item + '</strong>: +' + s.added + ' (' + s.start + ' → ' + s.end + ')</div>';
            if (s.removed > 0) removedHTML += '<div class="history-item">🔴 <strong>' + item + '</strong>: -' + s.removed + ' (' + s.start + ' → ' + s.end + ')</div>';
        }
        changeHistory.unshift({ time: '📅 ' + today, type: 'summary', added: addedHTML, removed: removedHTML });
        if (changeHistory.length > 150) changeHistory = changeHistory.slice(0, 150);
        saveAllData();
        renderAll();
        pushToCloud();
        showToast('✅ Итог дня добавлен');
    }

    function autoDailySummary() {
        var lastSummaryDate = localStorage.getItem('lastSummaryDate');
        var today = new Date().toLocaleDateString('ru-RU');
        if (lastSummaryDate !== today) {
            localStorage.setItem('lastSummaryDate', today);
            var yesterday = new Date(Date.now() - 86400000).toLocaleDateString('ru-RU');
            var hasYesterdayChanges = changeHistory.some(function(h) { return h.time && h.time.includes(yesterday); });
            if (hasYesterdayChanges && changeHistory.length > 0) dailySummary();
        }
    }

    function getShippedData() {
        var today = new Date().toLocaleDateString('ru-RU');
        if (!shippedHistory[today]) {
            shippedHistory[today] = {
                black: productionData.assembly['Отдано черные'] || 0,
                white: productionData.assembly['Отдано белые'] || 0
            };
        }
        var dates = Object.keys(shippedHistory).sort();
        var filteredDates = chartPeriod > 0 ? dates.slice(-chartPeriod) : dates;
        return {
            labels: filteredDates,
            black: filteredDates.map(function(d) { return shippedHistory[d].black; }),
            white: filteredDates.map(function(d) { return shippedHistory[d].white; })
        };
    }

    function drawChart() {
        var canvas = document.getElementById('chartCanvas');
        if (!canvas) return;
        var container = document.getElementById('chartContainer');
        canvas.width = container.offsetWidth - 40;
        canvas.height = 300;
        var ctx = canvas.getContext('2d');
        var chartData = getShippedData();
        if (chartData.labels.length === 0) {
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--txt2');
            ctx.font = '14px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText('Нет данных для отображения', canvas.width / 2, canvas.height / 2);
            return;
        }
        var padding = { top: 20, right: 30, bottom: 50, left: 60 };
        var chartWidth = canvas.width - padding.left - padding.right;
        var chartHeight = canvas.height - padding.top - padding.bottom;
        var maxValue = Math.max.apply(null, chartData.black.concat(chartData.white).concat([1]));
        maxValue = Math.ceil(maxValue * 1.1);
        ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--grid');
        ctx.lineWidth = 1;
        for (var i = 0; i <= 5; i++) {
            var y = padding.top + (chartHeight / 5) * i;
            ctx.beginPath();
            ctx.moveTo(padding.left, y);
            ctx.lineTo(padding.left + chartWidth, y);
            ctx.stroke();
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--txt2');
            ctx.font = '11px Segoe UI';
            ctx.textAlign = 'right';
            ctx.fillText(Math.round(maxValue - (maxValue / 5) * i), padding.left - 8, y + 4);
        }
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--txt2');
        ctx.font = '10px Segoe UI';
        ctx.textAlign = 'center';
        var step = Math.max(1, Math.floor(chartData.labels.length / 7));
        chartData.labels.forEach(function(label, i) {
            if (i % step === 0 || i === chartData.labels.length - 1) {
                var x = padding.left + (chartWidth / (chartData.labels.length - 1 || 1)) * i;
                ctx.fillText(label.split('.').slice(0, 2).join('.'), x, padding.top + chartHeight + 18);
            }
        });
        function drawLine(data, color, progress) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            var points = data.length - 1;
            var endIndex = Math.floor(points * progress);
            data.forEach(function(value, i) {
                var x = padding.left + (chartWidth / (points || 1)) * i;
                var y = padding.top + chartHeight - (value / maxValue) * chartHeight;
                if (i === 0) ctx.moveTo(x, y);
                else if (i <= endIndex) ctx.lineTo(x, y);
            });
            ctx.stroke();
            data.forEach(function(value, i) {
                if (i <= endIndex) {
                    var x = padding.left + (chartWidth / (points || 1)) * i;
                    var y = padding.top + chartHeight - (value / maxValue) * chartHeight;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
        if (chartAnimation) cancelAnimationFrame(chartAnimation);
        var progress = 0;
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--grid');
            ctx.lineWidth = 1;
            for (var i = 0; i <= 5; i++) {
                var y = padding.top + (chartHeight / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(padding.left + chartWidth, y);
                ctx.stroke();
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--txt2');
                ctx.fillText(Math.round(maxValue - (maxValue / 5) * i), padding.left - 8, y + 4);
            }
            chartData.labels.forEach(function(label, i) {
                if (i % step === 0 || i === chartData.labels.length - 1) {
                    var x = padding.left + (chartWidth / (chartData.labels.length - 1 || 1)) * i;
                    ctx.fillText(label.split('.').slice(0, 2).join('.'), x, padding.top + chartHeight + 18);
                }
            });
            drawLine(chartData.black, '#2d3436', progress);
            drawLine(chartData.white, '#b2bec3', progress);
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(padding.left, padding.top - 12, 12, 12);
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--txt');
            ctx.textAlign = 'left';
            ctx.fillText('Черные', padding.left + 18, padding.top);
            ctx.fillStyle = '#b2bec3';
            ctx.fillRect(padding.left + 80, padding.top - 12, 12, 12);
            ctx.fillText('Белые', padding.left + 98, padding.top);
            progress += 0.05;
            if (progress <= 1) chartAnimation = requestAnimationFrame(animate);
        }
        animate();
        canvas._chartData = chartData;
        canvas._padding = padding;
        canvas._maxValue = maxValue;
    }

    document.addEventListener('mousemove', function(e) {
        var canvas = document.getElementById('chartCanvas');
        if (!canvas || !canvas._chartData) return;
        var tooltip = document.getElementById('chartTooltip');
        var rect = canvas.getBoundingClientRect();
        var mouseX = e.clientX - rect.left;
        var mouseY = e.clientY - rect.top;
        var chartData = canvas._chartData;
        var padding = canvas._padding;
        var chartWidth = canvas.width - padding.left - padding.right;
        var points = chartData.labels.length - 1;
        if (points <= 0) return;
        var stepX = chartWidth / points;
        var dataIndex = Math.round((mouseX - padding.left) / stepX);
        if (dataIndex >= 0 && dataIndex < chartData.labels.length &&
            mouseX >= padding.left && mouseX <= padding.left + chartWidth &&
            mouseY >= padding.top && mouseY <= padding.top + (canvas.height - padding.top - padding.bottom)) {
            tooltip.style.display = 'block';
            tooltip.style.left = (mouseX + 15) + 'px';
            tooltip.style.top = (mouseY - 30) + 'px';
            tooltip.innerHTML = '📅 ' + chartData.labels[dataIndex] + '<br>⚫ Черные: <strong>' + chartData.black[dataIndex] + '</strong><br>⚪ Белые: <strong>' + chartData.white[dataIndex] + '</strong>';
        } else {
            tooltip.style.display = 'none';
        }
    });

                '<span class="goal-progress' + (isDone ? ' goal-done' : ' goal-pending') + '">' + percent + '%</span>' +
            '</div>' +
            (isDone ? '<p style="color:var(--green);text-align:center;font-weight:bold;margin-top:10px">🎉 План выполнен!</p>' : '<p style="color:var(--txt2);text-align:center;margin-top:10px">Осталось упаковать: ' + (planTotal - packedTotal) + ' рамок</p>');
    }

    function updateDailyGoal(value) {
        dailyGoals.total = Math.max(1, parseInt(value) || 100);
        saveAllData();
        renderGoals();
        pushToCloud();
    }

    // ===== СИНХРОНИЗАЦИЯ =====
    function startAutoSync() { stopAutoSync(); syncTimer = setInterval(syncData, SYNC_INTERVAL); }
    function stopAutoSync() { if (syncTimer) { clearInterval(syncTimer); syncTimer = null; } }

    async function loadFromCloud() {
        if (!isOnline) return;
        try {
            updateSyncStatus('sync-loading', '🔄 Загрузка данных...');
            var response = await fetch(SYNC_URL + '?t=' + Date.now());
            var cloudData = JSON.parse(await response.text());
            var localTime = parseInt(localStorage.getItem('lastUpdateTime') || '0');
            var cloudTime = cloudData.t || 0;
            if (cloudData.d && (isFirstSync || cloudTime > localTime)) {
                productionData = cloudData.d;
                if (cloudData.l) minLimits = cloudData.l;
                if (cloudData.h) changeHistory = cloudData.h;
                if (cloudData.n) notes = cloudData.n;
                if (cloudData.g) dailyGoals = cloudData.g;
                localStorage.setItem('lastUpdateTime', cloudTime);
                renderAll();
                updateStats();
                renderNotes();
                renderGoals();
                updateSyncStatus('sync-online', '🟢 Данные загружены');
            } else if (cloudTime < localTime) {
                await pushToCloud();
            } else {
                updateSyncStatus('sync-online', '🟢 Синхронизировано');
            }
            isFirstSync = false;
        } catch (e) { updateSyncStatus('sync-error', '🔴 Ошибка загрузки'); }
    }

    async function pushToCloud() {
        if (!isOnline) { saveAllData(); return; }
        var timestamp = Date.now();
        var payload = JSON.stringify({ d: productionData, l: minLimits, h: changeHistory.slice(0, 30), n: notes, g: dailyGoals, t: timestamp });
        try {
            updateSyncStatus('sync-loading', '🔄 Отправка...');
            await fetch(SYNC_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: payload });
            localStorage.setItem('lastUpdateTime', timestamp);
            updateSyncStatus('sync-online', '🟢 Синхронизировано');
        } catch (e) { updateSyncStatus('sync-error', '🔴 Ошибка отправки'); saveAllData(); }
    }

    async function syncData() {
        if (!isOnline) return;
        try {
            var response = await fetch(SYNC_URL + '?t=' + Date.now());
            var cloudData = JSON.parse(await response.text());
            var localTime = parseInt(localStorage.getItem('lastUpdateTime') || '0');
            var cloudTime = cloudData.t || 0;
            if (cloudData.d && cloudTime > localTime) {
                productionData = cloudData.d;
                if (cloudData.l) minLimits = cloudData.l;
                if (cloudData.h) changeHistory = cloudData.h;
                if (cloudData.n) notes = cloudData.n;
                if (cloudData.g) dailyGoals = cloudData.g;
                localStorage.setItem('lastUpdateTime', cloudTime);
                renderAll();
                updateStats();
                renderNotes();
                renderGoals();
                updateSyncStatus('sync-online', '🟢 Данные обновлены');
            } else if (cloudTime < localTime) {
                await pushToCloud();
            } else {
                updateSyncStatus('sync-online', '🟢 Синхронизировано');
            }
        } catch (e) { updateSyncStatus('sync-error', '🔴 Ошибка синхронизации'); }
    }

    function syncNow() {
        if (!isOnline) { showToast('❌ Нет интернета'); return; }
        pushToCloud().then(function() { showToast('✅ Синхронизировано'); }).catch(function() { showToast('❌ Ошибка синхронизации'); });
    }

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    async function init() {
        if (darkMode) document.body.setAttribute('data-theme', 'dark');
        renderAll();
        updateStats();
        renderLimitsPanel();
        renderNotes();
        renderGoals();
        if (isOnline) { await loadFromCloud(); startAutoSync(); }
        else updateSyncStatus('sync-offline', '🟡 Оффлайн');
        autoDailySummary();
        setTimeout(function() { if (document.getElementById('chartCanvas')) drawChart(); }, 500);
    }

    function updateStats() {
        var shippedTotal = (productionData.assembly['Отдано черные'] || 0) + (productionData.assembly['Отдано белые'] || 0);
        var criticalCount = 0;
        for (var category in productionData) {
            for (var item in productionData[category]) {
                if (item === 'Крючки') continue;
                var minLimit = minLimits[item] || 0;
                if (minLimit > 0 && productionData[category][item] <= minLimit) criticalCount++;
            }
        }
        document.getElementById('statsGrid').innerHTML =
            '<div class="stat-card"><h4>Синхронизация</h4><div class="stat-value" style="font-size:24px">' + (isOnline ? '🟢' : '🟡') + '</div></div>' +
            '<div class="stat-card"><h4>Отгружено всего</h4><div class="stat-value">' + shippedTotal + '</div></div>' +
            '<div class="stat-card"><h4>Критических запасов</h4><div class="stat-value" style="color:var(--red)">' + criticalCount + '</div></div>';
    }

    // ===== UI =====
    function toggleTheme() { darkMode = !darkMode; darkMode ? document.body.setAttribute('data-theme', 'dark') : document.body.removeAttribute('data-theme'); saveAllData(); }
    function switchTab(name) {
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
        event.target.classList.add('active');
        document.getElementById('tab-' + name).classList.add('active');
        if (name === 'stats') updateStats();
        if (name === 'goals') renderGoals();
        if (name === 'chart') setTimeout(drawChart, 100);
    }
    function clearHistory() { if (confirm('Очистить историю?')) { changeHistory = []; saveAllData(); renderAll(); pushToCloud(); } }

    // ===== АВТОРИЗАЦИЯ =====
    window.addEventListener('online', function() { isOnline = true; updateSyncStatus('sync-online', '🟢 Онлайн'); syncNow(); });
    window.addEventListener('offline', function() { isOnline = false; updateSyncStatus('sync-offline', '🟡 Оффлайн'); });

    function initAuth() { currentUser ? showApp() : showPasswordScreen(); }
    function showPasswordScreen() {
        document.getElementById('authOverlay').classList.remove('hidden');
        document.getElementById('appContainer').style.display = 'none';
        document.getElementById('authCard').innerHTML =
            '<h2>🏭 Вход</h2>' +
            '<input type="password" class="auth-input" id="passInput" placeholder="0000" maxlength="4" autofocus>' +
            '<p style="color:var(--red);display:none" id="passError">Неверный пароль</p>' +
            '<button class="btn btn-plus10" onclick="checkPassword()" style="width:100%;margin-top:10px;padding:12px;font-size:16px">Войти</button>';
        document.getElementById('passInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') checkPassword(); });
        setTimeout(function() { var input = document.getElementById('passInput'); if (input) input.focus(); }, 100);
    }
    function checkPassword() { document.getElementById('passInput').value === PASSWORD ? showUserSelect() : (document.getElementById('passError').style.display = 'block', document.getElementById('passInput').value = ''); }
    function showUserSelect() {
        var html = '<h2>👤 Кто вы?</h2><div class="user-list">';
        USER_LIST.forEach(function(user) { html += '<button class="user-btn" style="border-left:4px solid ' + USER_COLORS[user] + '" onclick="login(\'' + user + '\')">' + user + '</button>'; });
        html += '<button class="user-btn custom-user-btn" onclick="loginCustom()">✏️ Другое имя...</button></div>';
        document.getElementById('authCard').innerHTML = html;
    }
    function login(userName) { currentUser = userName; localStorage.setItem('currentUser', userName); showApp(); }
    function loginCustom() { var name = prompt('Введите ваше имя:'); if (name && name.trim()) { currentUser = name.trim(); localStorage.setItem('currentUser', currentUser); showApp(); } }
    function switchUser() {
        if (confirm('Сменить пользователя?')) { currentUser = null; localStorage.removeItem('currentUser'); document.getElementById('authOverlay').classList.remove('hidden'); document.getElementById('appContainer').style.display = 'none'; showPasswordScreen(); }
    }
    function showApp() {
        document.getElementById('authOverlay').classList.add('hidden');
        document.getElementById('appContainer').style.display = 'block';
        document.getElementById('userBadge').textContent = '👤 ' + currentUser;
        document.getElementById('userBadge').style.borderLeft = '4px solid ' + (USER_COLORS[currentUser] || '#636e72');
        document.getElementById('newNoteAssignee').innerHTML = '<option value="">Исполнитель...</option>' + USER_LIST.map(function(u) { return '<option value="' + u + '">' + u + '</option>'; }).join('');
        init();
    }

    initAuth();
    </script>
</body>
</html>
